spring:
  datasource:
    url: jdbc:h2:mem:practicedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    org.global.api: DEBUG

open-api:
  urls:
    users: https://jsonplaceholder.typicode.com/users
    posts: https://jsonplaceholder.typicode.com/posts
